{% extends 'app_base/base.html' %}
{% load static %}
{% load humanize %}

{% block content %}
<div class="max-w-xl mx-auto mt-12 p-6 bg-white rounded-2xl shadow-xl border border-blue-200 space-y-6">

    <h2 class="text-2xl font-bold text-center text-teal-600 mb-4">ثبت تعطیلی جدید</h2>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{form.media}}
        <div class="flex flex-col">
            <label for="{{ form.date.id_for_label }}" class="text-sm font-medium text-teal-600 mb-1">تاریخ:</label>
            {{ form.date }}
            {{ form.date.errors }}
        </div>

        <div class="flex flex-col">
            <label for="{{ form.name.id_for_label }}" class="text-sm font-medium text-teal-600 mb-1">علت:</label>
            {{ form.name }}
            {{ form.name.errors }}
        </div>

        <button type="submit"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2 px-4 rounded-xl shadow-md transition cursor-pointer">
            ثبت تعطیلی
        </button>
    </form>

    <a href="{% url 'managing:setting_app' %}">
        <button type="button"
                class="w-full mt-4 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-xl transition cursor-pointer">
            منوی تنظیمات
        </button>
    </a>
    <a href="{% url 'Attendance:list_holidays' %}">
        <button type="button"
                class="w-full mt-4 bg-blue-100 hover:bg-blue-300 text-gray-800 font-medium py-2 px-4 rounded-xl transition cursor-pointer">
            لیست تعطیلات
        </button>
    </a>
</div>
      <!-- لود jQuery و jsهای مورد نیاز تاریخ شمسی -->
    <script src="{% static 'admin/jquery.ui.datepicker.jalali/scripts/jquery-1.10.2.min.js' %}"></script>
    <script src="{% static 'admin/jquery.ui.datepicker.jalali/scripts/jquery.ui.core.js' %}"></script>
    <script src="{% static 'admin/jquery.ui.datepicker.jalali/scripts/jquery.ui.datepicker-cc.js' %}"></script>
    <script src="{% static 'admin/jquery.ui.datepicker.jalali/scripts/calendar.js' %}"></script>
    <script src="{% static 'admin/jquery.ui.datepicker.jalali/scripts/jquery.ui.datepicker-cc-fa.js' %}"></script>
    <link rel="stylesheet" href="{% static 'admin/jquery.ui.datepicker.jalali/themes/base/jquery-ui.min.css' %}">
<script>
    $(function () {
        $.datepicker.setDefaults($.datepicker.regional['fa']);
        $("input[name='date']").datepicker({
            dateFormat: 'yy-mm-dd'
        });
    });
</script>
{% endblock %}
