<html>
<head>
    <style>
        /**
         * @license
         * Copyright 2019 Google LLC. All Rights Reserved.
         * SPDX-License-Identifier: Apache-2.0
         */
        /**
         * Always set the map height explicitly to define the size of the div element
         * that contains the map.
         */
        #map {
            height: 100%;
        }

        /* Optional: Makes the sample page fill the window. */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .custom-map-control-button {
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 30px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .custom-map-control-button:hover {
            background-color: #0056b3;
        }

        #submitLocationButton {
            position: fixed;
            top: 10px;
            left: 25%;
            transform: translateX(-50%);
            z-index: 1;
            display: none;
        }
    </style>
    <title>Geolocation</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
</head>
<body>
<div id="map"></div>
<button id="submitLocationButton" class="custom-map-control-button">
    ثبت
</button>
<script>
    /**
     * @license
     * Copyright 2019 Google LLC. All Rights Reserved.
     * SPDX-License-Identifier: Apache-2.0
     */
        // Note: This example requires that you consent to location sharing when
        // prompted by your browser. If you see the error "The Geolocation service
        // failed.", it means you probably did not give permission for the browser to
        // locate you.
    let map, infoWindow;

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: {lat: 32.4279, lng: 53.6880},
            zoom: 6,
        });
        infoWindow = new google.maps.InfoWindow();

        const locationButton = document.createElement("button");

        locationButton.textContent = "حرکت به مکان فعلی";
        locationButton.classList.add("custom-map-control-button");
        map.controls[google.maps.ControlPosition.TOP_CENTER].push(
            locationButton
        );
        const rejectLocationButton = document.createElement("button");
        rejectLocationButton.textContent = "رد کردن";
        rejectLocationButton.classList.add("custom-map-control-button");
        map.controls[google.maps.ControlPosition.TOP_RIGHT].push(rejectLocationButton);


        rejectLocationButton.addEventListener("click", () => {
            window.location.href = "{% url 'Attendance:ignore_location' %}";
        });

        locationButton.addEventListener("click", () => {
            // Try HTML5 geolocation.
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const pos = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                        };

                        infoWindow.setPosition(pos);
                        infoWindow.setContent("Location found.");
                        infoWindow.open(map);
                        map.setCenter(pos);
                        map.setZoom(18);

                        const submitLocationButton = document.getElementById("submitLocationButton");
                        submitLocationButton.style.display = "block"; // Show the submit button
                    },
                    () => {
                        handleLocationError(true, infoWindow, map.getCenter());
                    }
                );
            } else {
                // Browser doesn't support Geolocation
                handleLocationError(false, infoWindow, map.getCenter());
            }
        });

        const submitLocationButton = document.getElementById(
            "submitLocationButton"
        );
        submitLocationButton.addEventListener("click", () => {
            const currentPosition = infoWindow.getPosition();
            const latitude = currentPosition.lat();
            const longitude = currentPosition.lng();

            // Create a form and append latitude and longitude data
            const form = document.createElement("form");
            form.method = "POST";
            form.action = "{% url 'Attendance:process_user_location' %}"; // Replace with your actual endpoint URL

            const latitudeInput = document.createElement("input");
            latitudeInput.type = "hidden";
            latitudeInput.name = "latitude";
            latitudeInput.value = latitude;
            form.appendChild(latitudeInput);

            const longitudeInput = document.createElement("input");
            longitudeInput.type = "hidden";
            longitudeInput.name = "longitude";
            longitudeInput.value = longitude;
            form.appendChild(longitudeInput);

            // Append the form to the document and submit it
            document.body.appendChild(form);
            form.submit();
        });
    }

    function handleLocationError(browserHasGeolocation, infoWindow, pos) {
        infoWindow.setPosition(pos);
        infoWindow.setContent(
            browserHasGeolocation
                ? "Error: دسترسی به موقعیت شما ممکن نیست (از تلفن همراه استفاده کنید یا  روی رد کردن کلیک کنید)."
                : "Error: Your browser doesn't support geolocation."
        );
        infoWindow.open(map);
    }

    window.initMap = initMap;
</script>
<script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmFYr4NE83ksJrSYdPK3fu8X1vKJ_8rgI&callback=initMap&v=weekly&solution_channel=GMP_CCS_geolocation_v1"
        defer
></script>
</body>
</html>
