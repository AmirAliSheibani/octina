{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>سیستم حضور غیاب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'css/app.css' %}">
    <style>

        @font-face {
            font-family: 'Shabnam';
            src: url('{% static 'fonts/Shabnam.ttf' %}') format('truetype');
        }

        body {
            font-family: 'Shabnam', sans-serif;
            height: 100%;
            direction: rtl;
            text-align: right;
        }


    </style>
</head>
<!-- اضافه کردن کتابخانه jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<body>


<div class="container">
    <table>
        <tr>
            <th>تاریخ</th>
            <th>علت</th>
            {% if request.user.is_staff %}
            <th>حذف</th>
            <th>تغییر</th>
            {% endif %}
        </tr>
        {% for holiday in holidays %}
        <tr>
            <td>{{ holiday.date }}</td>
            <td>{{ holiday.name }}</td>
            {% if request.user.is_staff %}


            <td><a href="{% url 'Attendance:delete_holiday' holiday.id %}">
        <button type="button">حذف</button>
    </a></td>
            <td><a href="{% url 'Attendance:update_holiday' holiday.id %}">
        <button type="button">تغییر</button>
    </a></td>
        {% endif %}
</tr>
         {% endfor %}
    </table>




{% if request.user.is_staff %}
    <a href="{% url 'Attendance:setting_app' %}">
        <button type="button">منوی تنظیمات</button>
    </a>{% endif %}

    <a href="{% url 'Attendance:redirected_view' %}">
        <button type="button">برگشت به خانه</button>
    </a>

</div>
</body>
</html>
