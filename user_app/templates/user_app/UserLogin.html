{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ورود به سایت</title>
    <link rel="stylesheet" href="{% static 'css/css1.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
  </head>
  <body>

    <div class="container">

      <div class="wrapper">
        <div class="title"><span>فرم ورود به سایت</span></div>
        <form method="post">
            {% csrf_token %}
            {{ form.errors }}
          <div class="row">
            <i class="fas fa-user"></i>
              {{ form.username }}
          </div>
          <div class="row">
            <i class="fas fa-lock"></i>
            {{ form.password }}
          </div>
          <div class="pass"><a href="{% url 'user:register' %}">پسوردت رو فراموش کردی؟</a></div>
          <div class="row button">
            <input type="submit" value="Login">
          </div>
          <div class="signup-link">عضو نشدی؟ <a href="{% url 'user:register' %}">الان عضو شو</a></div>
            <div class="signup-link">برو به <a href="{% url 'home:home' %}">صفحه اصلی</a></div>
        </form>
      </div>
    </div>
  </body>
</html>
