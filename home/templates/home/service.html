{% extends 'base.html' %}
{% load static %}
{% block class %}sub_page{% endblock %}
{% block content %}
</div>

  <!-- service section -->

  <section class="service_section layout_padding">
        <div class="service_container">
            <div class="container ">
                <div class="heading_container heading_center">
                    <h2>
                       <span>خدمات</span>  ما
                    </h2>
                    <p>
                        سرویس هایی که وب اپلیکیشن ما به شما میدهد
                    </p>
                </div>
                <div class="row">
                    {% for service in services %}

                    <div class="col-md-4 ">
                        <div class="box ">
                            <div class="img-box">
                                <img src="{{service.image.url}}" alt="">
                            </div>
                            <div class="detail-box">
                                <h5>
                                    {{ service.title}}
                                </h5>
                                <p>{{service.description}}
                                </p>
                                <a href="{% url 'home:service' %}">
                                    Read More
                                </a>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="btn-box">
                    <a href="{% url 'home:service' %}">
                        View All
                    </a>
                </div>
            </div>
        </div>
    </section>

  <!-- end service section -->
{% endblock %}
